version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    env_file: .env
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    env_file: .env
    volumes:
      - ./volumes/minio:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  prefect:
    image: prefecthq/prefect:2.20.18-python3.11 
    command: prefect server start --host 0.0.0.0
    env_file: .env
    ports:
      - "4200:4200"
    depends_on:
      - postgres

  backend:
    build: ./backend
    env_file: .env
    volumes:
      - ./backend:/app
      - ./schema.yaml:/app/schema.yaml
    ports:
      - "8001:8001"
    depends_on:
      - postgres

  vlm:
    build: ./vlm_service
    env_file: .env
    volumes:
      - ./vlm_service:/app
    ports:
      - "8003:8003"

  worker:
    build: ./worker
    env_file: .env
    volumes:
      - ./worker:/app
      - ./schema.yaml:/app/schema.yaml
    ports:
      - "8002:8002"
    depends_on:
      - prefect
      - minio
      - backend
      - vlm